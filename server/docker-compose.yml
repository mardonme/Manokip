services:
  db:
    image: postgres:16
    container_name: manokip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manokip_test
    ports:
      - "5433:5432"
    volumes:
      - manokip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manokip_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  manokip-db-data:
