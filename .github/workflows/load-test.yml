# Phase 5 plan 05-05 task 5.2 — workflow_dispatch-only load test (CTA-04 + D-11).
#
# Manual-trigger ONLY. Do NOT add `pull_request` or `push` triggers — running
# 5 ab tests of 500 requests each on every PR would dominate CI minutes and
# exhaust Resend quota / Vercel concurrency budgets (T-05-05-02 mitigation).
#
# Acceptance: scripts/load-test.sh exits non-zero on any failed request OR
# p95 > P95_BUDGET_MS budget. Default budget 2000 ms; override via input.

name: load-test

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Vercel preview URL (e.g. https://manometr-xxx.vercel.app)"
        required: true
        type: string
      p95_budget_ms:
        description: "p95 latency budget in milliseconds"
        required: false
        type: string
        default: "2000"

permissions:
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install apache2-utils (provides ab)
        run: sudo apt-get install -y apache2-utils

      - name: Run load test
        env:
          PREVIEW_URL: ${{ inputs.preview_url }}
          P95_BUDGET_MS: ${{ inputs.p95_budget_ms }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bash scripts/load-test.sh
