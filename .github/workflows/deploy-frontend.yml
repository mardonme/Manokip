name: Deploy frontend → luva.uz

# Frontend deploys automatically on every push to main that touches site/**.
# GitHub's runner builds the Vite app, then rsyncs the built dist/ to the VPS
# over SSH. The server needs no Node/build tooling — nginx serves the files.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}        # also runnable by hand from the Actions tab

# Never let two frontend deploys race; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        # Production is same-origin (nginx proxies /api & /uploads), so the
        # API base is intentionally empty.
        env:
          VITE_API_URL: ''
        run: npm run build

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy dist via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            site/dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/manokip/site/dist/"

      - name: Summary
        run: echo "✅ Frontend deployed to https://luva.uz"
