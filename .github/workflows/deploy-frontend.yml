name: Deploy frontend → luva.uz

# Runs on the SELF-HOSTED runner installed on the VPS itself, so the deploy
# is fully local — no SSH, no rsync-over-ssh, no DEPLOY_* secrets. The runner
# builds the Vite app and copies the built dist/ straight into the nginx web
# root. Frontend deploys automatically on every push to main touching site/**.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}        # also runnable by hand from the Actions tab

# Never let two frontend deploys race; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-deploy:
    # The `manokip` label pins this to THIS repo's runner on the shared VPS.
    runs-on: [self-hosted, manokip]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        # Production is same-origin (nginx proxies /api & /uploads), so the
        # API base is intentionally empty.
        env:
          VITE_API_URL: ''
        run: npm run build

      - name: Publish to nginx web root
        # Local copy on the VPS — no network. --delete clears stale old assets.
        run: rsync -a --delete site/dist/ /opt/manokip/site/dist/

      - name: Summary
        run: echo "✅ Frontend deployed to https://luva.uz"
