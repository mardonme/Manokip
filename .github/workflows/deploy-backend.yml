name: Deploy backend (manual)

# Backend is deployed ONLY by hand: open the Actions tab → "Deploy backend
# (manual)" → "Run workflow". Rebuilding the API touches the live Postgres
# (prisma db push runs on container start), so this is never automatic.
#
# Runs on the SELF-HOSTED runner on the VPS, so every step is local — no SSH,
# no DEPLOY_* secrets. It syncs server/ into /opt/manokip/server, then rebuilds
# & restarts the `api` container. Production secrets (/opt/manokip/.env),
# uploads, and the DB volume are left untouched.

on:
  workflow_dispatch:
    inputs:
      reseed:
        description: 'Reseed the database after deploy (DANGER — overwrites seed data)'
        type: boolean
        default: false

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    # The `manokip` label pins this to THIS repo's runner on the shared VPS.
    runs-on: [self-hosted, manokip]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync server/ source
        # Local rsync on the VPS. --delete keeps the deploy dir in sync, but the
        # excluded paths are protected from deletion: prod .env, uploads,
        # node_modules, dev DB, logs.
        run: |
          rsync -a --delete \
            --exclude node_modules --exclude .env --exclude uploads \
            --exclude 'prisma/dev.db*' --exclude '*.log' \
            server/ /opt/manokip/server/

      - name: Rebuild & restart API
        run: cd /opt/manokip && docker compose up -d --build api

      - name: Reseed database (optional)
        if: ${{ inputs.reseed }}
        run: docker exec -w /app/server manokip-api npm run seed

      - name: Summary
        run: echo "✅ Backend (api) rebuilt and restarted on the VPS"
