# Plan 03-09 Task 9.2 — Lighthouse CI on Vercel preview deployments (SEO-05).
#
# Mirrors the e2e-preview workflow shape (Plan 02-17 Task 17.3): waits for the
# Vercel preview to be ready via patrickedqvist/wait-for-vercel-preview, then
# runs treosh/lighthouse-ci-action against the preview URL with the same
# Vercel Deployment Protection bypass pattern (Pitfall #11) — the bypass
# secret is threaded into Lighthouse's request headers so it can fetch the
# protected preview.
#
# OPT-IN / NON-BLOCKING posture: assertions in .lighthouserc.json are `warn`
# (NOT `error`), so a flaky preview LCP measurement does not block PR merge.
# The manual Slow-4G real-device gate (per 03-VALIDATION.md) remains the
# source of truth for SEO-05 sign-off until Phase 5 dogfooding hardens
# preview LCP into a blocking gate.
#
# Workflow trigger: pull_request on src/** + next.config.ts + package.json
# changes (the things that move LCP); workflow_dispatch for manual runs.

name: Lighthouse Preview (SEO-05)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.lighthouserc.json'
      - '.github/workflows/lighthouse-preview.yml'
  workflow_dispatch:

# Cancel in-flight runs on the same PR when a new commit lands — saves
# Lighthouse minutes (3 runs × ~30s + Vercel preview wait) on rapid pushes.
concurrency:
  group: lighthouse-preview-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: SEO-05 LCP measurement on preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Wait for the Vercel preview deployment to finish building. Same
      # action + same posture as .github/workflows/e2e-preview.yml: polls
      # GitHub deployment statuses for the PR's head SHA and exits when the
      # Vercel deployment status flips to 'success', exposing the preview URL
      # on `steps.preview.outputs.url`.
      - name: Wait for Vercel preview
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600

      # Run Lighthouse CI against the product detail page (LCP-sensitive
      # surface — hero image + spec tables). 3 runs, mobile preset with
      # Slow-4G throttling per .lighthouserc.json. Uploads run artifacts to
      # temporary public storage so PR reviewers can click through to the
      # report.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.preview.outputs.url }}/uz/products/manometr-m-100
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          # Pitfall #11 — Vercel Deployment Protection bypass header. Same
          # secret (VERCEL_AUTOMATION_BYPASS_SECRET) used by the e2e-preview
          # workflow. lighthouse-ci-action picks up LHCI_EXTRA_HEADERS and
          # threads them into every request Lighthouse makes against the URL.
          # When the secret is unset (Deployment Protection OFF on previews),
          # the env var is empty and Lighthouse sends no extra header.
          LHCI_EXTRA_HEADERS: '{"x-vercel-protection-bypass":"${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"}'
