<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="gauge.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="catalog.jsx"></script>
<script type="text/babel" src="product.jsx"></script>
<script type="text/babel" src="service.jsx"></script>
<script type="text/babel" src="misc.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="storefront" title="Storefront" subtitle="Customer-facing site · 1440px wide">
        <DCArtboard id="home" label="Home" width={1440} height={3200}><HomePage /></DCArtboard>
        <DCArtboard id="catalog" label="Catalog (PLP)" width={1440} height={2000}><CatalogPage /></DCArtboard>
        <DCArtboard id="product" label="Product detail" width={1440} height={2400}><ProductPage /></DCArtboard>
        <DCArtboard id="solutions" label="Solutions" width={1440} height={1700}><SolutionsPage /></DCArtboard>
        <DCArtboard id="service" label="Service & calibration" width={1440} height={1900}><ServicePage /></DCArtboard>
        <DCArtboard id="about" label="About" width={1440} height={1900}><AboutPage /></DCArtboard>
        <DCArtboard id="contact" label="Contact" width={1440} height={1700}><ContactPage /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
