<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Manokip — Print</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { font-family: 'Inter Tight', -apple-system, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .page {
    width: 1440px;
    margin: 0 auto;
    background: #f5f3ee;
    break-after: page;
    page-break-after: always;
  }
  .page:last-child { break-after: auto; page-break-after: auto; }
  .page-label {
    padding: 14px 40px;
    background: #14161b;
    color: #f5f3ee;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }
  @media print {
    @page { size: 1480px 2200px; margin: 20px; }
    body { background: #fff; }
    .page { box-shadow: none; margin: 0; }
  }
  @media screen {
    body { padding: 32px 0; }
    .page { box-shadow: 0 4px 30px rgba(0,0,0,0.08); margin-bottom: 40px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="gauge.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="catalog.jsx"></script>
<script type="text/babel" src="product.jsx"></script>
<script type="text/babel" src="service.jsx"></script>
<script type="text/babel" src="misc.jsx"></script>

<script type="text/babel" data-presets="react">
const PAGES = [
  { n: '01', label: 'Home', C: HomePage },
  { n: '02', label: 'Catalog (PLP)', C: CatalogPage },
  { n: '03', label: 'Product detail', C: ProductPage },
  { n: '04', label: 'Solutions', C: SolutionsPage },
  { n: '05', label: 'Service & calibration', C: ServicePage },
  { n: '06', label: 'About', C: AboutPage },
  { n: '07', label: 'Contact', C: ContactPage },
];

function Print() {
  return (
    <div>
      {PAGES.map(p => (
        <div className="page" key={p.n}>
          <div className="page-label">
            <span>MANOKIP / SITE DESIGN</span>
            <span>{p.n} — {p.label}</span>
          </div>
          <p.C />
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Print />);

// auto-print after fonts + render settle
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  setTimeout(() => window.print(), 800);
})();
</script>
</body>
</html>
